<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diesel AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #111827;
  padding: 30px;
  border-radius: 15px;
  width: 500px;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

h2 {
  text-align: center;
  color: #38bdf8;
}

.selects, .search {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

select, input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
}

.resultado {
  margin-top: 20px;
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  min-height: 60px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚛 Diesel AI</h2>

  <div class="selects">
    <select id="marca">
      <option value="">Marca</option>
      <option value="cummins">Cummins</option>
      <option value="detroit">Detroit</option>
      <option value="volvo">Volvo</option>
    </select>

    <select id="motor">
      <option value="">Motor</option>
      <option value="isx">ISX15</option>
      <option value="dd15">DD15</option>
      <option value="d13">D13</option>
    </select>
  </div>

  <div class="search">
    <input id="input" placeholder="SPN / Falla / Síntoma">
    <button onclick="buscar()">Buscar</button>
  </div>

  <div class="resultado" id="resultado">
    Resultado aparecerá aquí...
  </div>
</div>

<script>
function buscar() {
  const codigo = document.getElementById("input").value.toLowerCase();
  const marca = document.getElementById("marca").value;
  const motor = document.getElementById("motor").value;

  if (codigo.includes("157") && marca === "detroit") {
    document.getElementById("resultado").innerText =
      "🔧 Baja presión de combustible en DD15.\nRevisar bomba, filtros y aire en sistema.";
  } else {
    document.getElementById("resultado").innerText =
      "❌ No encontrado aún.";
  }
}
</script>

</body>
</html>
